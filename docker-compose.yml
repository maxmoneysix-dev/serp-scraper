version: '3.8'

services:
  # AI Agent Engine - Handles browser automation and AI tasks
  ai-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai-engine
    container_name: serp-ai-engine
    restart: always
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - PROXIES_SX_API_KEY=${PROXIES_SX_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./browser:/app/browser
    networks:
      - serp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # API Server - Handles x402 payments and client requests
  api-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.api-server
    container_name: serp-api-server
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - X402_PRIVATE_KEY=${X402_PRIVATE_KEY}
      - X402_RECEIVER_ADDRESS=${X402_RECEIVER_ADDRESS}
      - AI_ENGINE_URL=http://ai-engine:8000
    depends_on:
      - redis
      - ai-engine
    networks:
      - serp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Redis - Caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: serp-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - serp-net
    command: redis-server --appendonly yes

  # Nginx - Reverse proxy and SSL
  nginx:
    image: nginx:alpine
    container_name: serp-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-server
    networks:
      - serp-net

volumes:
  redis-data:
    driver: local

networks:
  serp-net:
    driver: bridge
