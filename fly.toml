# Fly.io deployment configuration
# Deploy: fly deploy
# Docs: https://fly.io/docs/

app = 'serp-scraper'
primary_region = 'iad'

[build]
  dockerfile = 'docker/Dockerfile.api-server'

[env]
  PORT = '8080'
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[http_service.checks]]
  interval = '30s'
  timeout = '5s'
  grace_period = '10s'
  method = 'GET'
  path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# Uncomment for AI Engine (deploy separately)
# [processes]
#   app = "node api/server.js"
#   ai-engine = "python -m uvicorn api.main:app --host 0.0.0.0 --port 8000"
